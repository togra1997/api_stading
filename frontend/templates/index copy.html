<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <!-- Bootstrap用CSSの読み込み -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- 中略 -->
    <!-- https://ics.media/entry/190826/ -->

    <!-- Bootstrap用JavaScriptの読み込み -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <!-- タブの設定-->
    <ul class="nav nav-tabs">
      <!-- ここに要素を追加していきます -->
      <li class="nav-item">
        <button
          class="nav-link active"
          data-bs-toggle="tab"
          data-bs-target="#photo1"
          type="button"
        >
          タブ1
        </button>
      </li>
      <li class="nav-item">
        <button
          class="nav-link"
          data-bs-toggle="tab"
          data-bs-target="#photo2"
          type="button"
        >
          タブ2
        </button>
      </li>
      <li class="nav-item">
        <button
          class="nav-link"
          data-bs-toggle="tab"
          data-bs-target="#photo3"
          type="button"
        >
          タブ3
        </button>
      </li>
      <li class="nav-item">
        <button
          class="nav-link"
          data-bs-toggle="tab"
          data-bs-target="#photo4"
          type="button"
        >
          タブ4
        </button>
      </li>
    </ul>

    <!--タブの中身-->
    <div class="tab-content">
      <div id="photo1" class="tab-pane active">
        <div class="border border-primary col-6">
          <p class="h1">test</p>
          <form class="was-validated">
            <div class="mb-3">
              <select
                class="form-select"
                required
                aria-label="select example"
                id="test"
              >
                <option value="">Open this select menu</option>
                <option value="aaa">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
              </select>
              <div class="invalid-feedback">
                Example invalid select feedback
              </div>
            </div>
            <button
              type="button"
              class="btn btn-primary"
              onclick="onclickSample()"
            >
              Base class
            </button>
          </form>
        </div>
      </div>
      <div id="photo2" class="tab-pane" id="photo2-pane">test</div>
      <div id="photo3" class="tab-pane" id="photo3-pane">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoXulfbNfZRiHlFwZmQkEFi5kS_40UYqHtrw&s"
          class="img-fluid"
          alt="写真：カメラの方向を向く猫の顔"
        />
      </div>
      <div id="photo4" class="tab-pane" id="photo4-pane">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSwiGi7KFYKwy1l1H13L0n1QveUaUr5kq9GvA&s"
          class="img-fluid"
          alt="写真：カゴに入っている猫"
        />
      </div>
    </div>
    <!--javascript-->
    <script>
      function onclickSample() {
        let element = document.getElementById("test");

        alert(element.value);
      }
    </script>
  </body>
</html>
